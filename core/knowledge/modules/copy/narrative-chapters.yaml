# Narrative 9 chapter 文案模板（對齊 narrative-normalizer.js:enrichChapter）
# 變數：brand, competitor, venue, influence_str, avg_str, multiplier, posts_str,
#       peak_month, peak_str, trough_month, trough_str, ratio, positive_pct,
#       negative_pct, top_platform, top_kol_ratio, so_influence_multiplier, ...
#
# 每個章節有 so_what / action_link / data_table（部分章節）
# so_what 和 action_link 都支援條件模板（有資料用完整版、無資料用 fallback）

_meta:
  name: narrative-chapters
  description: 9 chapter 的 so_what / action_link 模板

chapter_templates:

  social_overview:
    so_what:
      - when: multiplier
        then: "${brand} 影響力 ${influence_str}，為全站平均 ${avg_str} 的 ${multiplier} 倍，顯示品牌在場域具有顯著社群主導力。"
      - "${brand} 累計影響力 ${influence_str}，社群能見度表現亮眼。"
    action_link: "建議持續監控月度影響力趨勢，在高峰月份前加碼社群內容投入。"
    data_table_headers: ["指標", "${brand}", "${competitor|競品}", "倍數"]
    data_table_rows:
      - { label: "影響力指數", self_key: "influence", comp_key: "influence" }
      - { label: "發文數", self_key: "posts", comp_key: "posts" }
      - { label: "讚數", self_key: "likes", comp_key: "likes", no_ratio: true }
      - { label: "留言數", self_key: "comments", comp_key: "comments", no_ratio: true }
      - { label: "分享數", self_key: "shares", comp_key: "shares", no_ratio: true }

  monthly_trend:
    so_what:
      - when: peak_month
        then: "高峰月份 ${peak_month}（影響力 ${peak_str}），低谷 ${trough_month}（${trough_str}），峰谷比 ${ratio} 倍。波動幅度大，需在淡季主動維持聲量。"
    action_link: "建議在歷史高峰月份前 1 個月提前佈局社群內容，淡季加碼短影音維持基本聲量。"
    data_table_headers: ["月份", "影響力", "發文數", "讚數"]

  sentiment:
    so_what:
      - when: positive_pct
        then: "正面情緒佔 ${positive_pct}%，品牌形象維護良好。需持續關注負面聲量（${negative_pct|0.0}%）的來源和趨勢。"
      - "整體好感度表現穩定，正面情緒佔多數。"
    action_link: "建議定期監控負面聲量來源，針對高頻負面議題制定回應策略。"

  platform:
    so_what:
      - when: top_platform
        then: "${top_platform} 是 ${brand} 社群討論的主要場域（影響力 ${top_platform_influence}），建議優先經營此平台。"
      - "平台分布均勻，無明顯集中趨勢。"
    action_link: "建議根據各平台特性差異化內容策略：Instagram 重視覺、Facebook 重互動、YouTube 重深度。"

  kol:
    so_what:
      - when: top3_ratio
        then: "前 3 大 KOL 佔總 KOL 影響力的 ${top3_ratio}%，頭部集中效應明顯。與頭部 KOL 的合作關係是品牌聲量的關鍵支柱。"
    action_link: "建議與前 3 大 KOL 建立長期合作關係，同時發展中腰部 KOL 降低風險集中度。"

  search_intent:
    so_what: "搜尋數據顯示消費者對 ${brand} 有明確的購物和資訊搜尋需求，長尾字反映出具體的產品偏好。"
    action_link: "建議針對高搜量的購物意圖關鍵字優化搜尋引擎內容和到站頁面。"

  competitor_comparison:
    so_what:
      - when: so_vs_comp_multiplier
        then: "${brand} 影響力為 ${competitor} 的 ${so_vs_comp_multiplier} 倍，在社群能見度上保持領先。但需持續監控競品動態，防止差距縮小。"
    action_link: "建議每月追蹤 ${brand} vs ${competitor} 的影響力倍數變化，作為品牌健康度 KPI。"

  news_events:
    so_what: "新聞事件與社群聲量波動有對應關係，可作為趨勢歸因的重要參考。重大事件應標註在趨勢圖上。"
    action_link: "建議建立新聞事件監測機制，在重大事件發生時快速調整社群內容策略。"

  swot:
    so_what: "綜合 SWOT 分析，${brand} 在場域具有社群主導力優勢，應把握搜尋意圖強的機會期，同時注意淡季波動和競品威脅。"

  actions:
    so_what: "以上建議根據數據分析結果提出，按優先級排序，聚焦在時機把握、KOL 合作、搜尋優化三大方向。"

# 頂層文案
top_level:
  title_template: "${brand} 品牌社群深度分析報告"
  key_angle_injection: "本報告特別關注「${angle}」，從數據中觀察此面向的表現與趨勢。"
  data_reference_injection: "${brand} 在過去期間累計影響力指數達 ${influence_str}，發文數 ${posts_str} 篇，來自 ${authors_str} 位作者、${channels_str} 個頻道。總互動數（讚+留言+分享）達 ${total_engagement_str}。"
  sentiment_injection: "正面情緒佔比 ${positive_pct}。"
  recommendation_priorities: [立即, 短期]
  recommendation_fallback:
    who: "行銷團隊"
    immediate_when: "本月"
    short_when: "本季"
    kpi: "待定義"
